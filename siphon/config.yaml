name: "Siphon"
version: "editor2"
slug: "siphon"
description: "High-performance modular IoT data aggregator and dispatcher."
url: "https://github.com/mekops-labs/siphon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false

map:
  - type: addon_config
    read_only: False
    path: /config

ingress: true
ingress_port: 8099
panel_icon: "mdi:pipe"
panel_title: "Siphon Config"

options:
  env_vars:
    MQTT_USER: "admin"
    MQTT_PASS: "password"
    IOT_PLOTTER_API_KEY: "insert_key_here"

schema:
  env_vars:
    MQTT_USER: str
    MQTT_PASS: password
    IOT_PLOTTER_API_KEY: password
