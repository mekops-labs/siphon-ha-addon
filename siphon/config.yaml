name: "Siphon"
version: 0.5.4
slug: "siphon"
description: "High-performance modular IoT data aggregator and dispatcher"
url: "https://github.com/mekops-labs/siphon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false

map:
  - type: addon_config
    read_only: False
    path: /config

services:
  - mqtt:want

homeassistant_api: true

ports:
  8080/tcp: 8080

ports_description:
  8080/tcp: "Siphon Webhook Collector"

ingress: true
ingress_port: 8099
panel_icon: "mdi:pipe-valve"
panel_title: "Siphon Config"

options:
  env_vars: []

schema:
  env_vars:
    - name: str
      value: str
